[package]
name = "package-name"
version = "1.0.0"
type = "binary"          # binary | library | meta
architecture = "x86_64"
description = "Package description"
maintainer = "Your Name <email@example.com>"
license = "GPL-3.0"
homepage = "https://example.com"
tags = ["tag1", "tag2"]
dependencies = []
conflicts = []
provides = []
replaces = []
conf = []
bootstrap = false

[source]
url = "https://example.com/package-1.0.0.tar.xz"
type_src = "tarball"     # tarball | git-repo
include_submodules = false

[build]
# template: meson | cmake | autotools | cargo | python-pep517 | gradle | makefile | kbuild | custom
template = "meson"
dependencies = []
use = []

[install]
script = ""

[scripts]
# Install/Remove scripts templates
# Available templates:
#   - "init" — neoinit service management
#   - "update-alternatives" — switch alternatives system
#   - "path" — add to PATH via /etc/profile.d (use add_to_path = true)
#   - "reload" — reload neoinit services
#   - "ldconfig" — update library cache
postinstall = ["init", "ldconfig"]
preremove = []
postremove = []
add_to_path = false  # Generate /etc/profile.d script

# Optional: neoinit service configuration
# If defined, generates /etc/neoinit/services/<name>.yaml
[service]
exec = "/usr/bin/curl --help"  # Command to execute
description = "Example service"
working_dir = "/"
restart = true
type = "simple"  # simple | forking | oneshot
# user = "nobody"
# group = "nogroup"

[service.env]
# Environment variables
# CURL_HOME = "/var/lib/curl"

