[package]
name = "gdb"
version = "14.2"
type = "binary"
architecture = "aarch64"
description = "GNU Project debugger"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0"
homepage = "https://www.gnu.org/software/gdb/"
dependencies = ["expat", "python3", "ncurses", "mpfr"]
bootstrap = false

[source]
url = "https://ftp.gnu.org/gnu/gdb/gdb-14.2.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["expat-devel", "python3-devel", "ncurses-devel", "mpfr-devel", "texinfo"]
use = []

[install]
script = ""
