[package]
name = "openssh"
version = "9.7p1"
type = "binary"
architecture = "aarch64"
description = "OpenBSD Secure Shell"
maintainer = "NurOS Team <team@nuros.org>"
license = "BSD-2-Clause"
homepage = "https://www.openssh.com"
dependencies = ["openssl", "zlib", "pam"]

[source]
url = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-9.7p1.tar.gz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["openssl-devel", "zlib-devel", "pam-devel"]
use = []

[install]
script = ""
