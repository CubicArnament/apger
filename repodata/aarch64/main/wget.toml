[package]
name = "wget"
version = "1.24.5"
type = "binary"
architecture = "aarch64"
description = "Network utility to retrieve files from the web"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0"
homepage = "https://www.gnu.org/software/wget/"
dependencies = ["openssl", "zlib", "pcre2"]

[source]
