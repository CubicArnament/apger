[package]
name = "glib2"
version = "2.80.0"
type = "binary"
architecture = "aarch64"
description = "Low-level core library for GNOME"
maintainer = "NurOS Team <team@nuros.org>"
license = "LGPL-2.1"
homepage = "https://docs.gtk.org/glib/"
dependencies = ["libffi", "pcre2", "zlib"]

[source]
url = "https://download.gnome.org/sources/glib/2.80/glib-2.80.0.tar.xz"
type_src = "tarball"

[build]
template = "meson"
dependencies = ["libffi-devel", "pcre2-devel", "zlib-devel"]
use = []

[install]
script = ""
