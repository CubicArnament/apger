[package]
name = "bzip2"
version = "1.0.8"
type = "library"
architecture = "aarch64"
description = "bzip2 — high-quality block-sorting file compressor using the Burrows-Wheeler algorithm; provides libbz2 shared library"
maintainer = "NurOS Team <team@nuros.org>"
license = "bzip2-1.0.6"
homepage = "https://sourceware.org/bzip2/"
dependencies = ["glibc"]
bootstrap = false

[source]
url = "https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz"
type_src = "tarball"

[build]
template = "makefile"
dependencies = ["make", "gcc"]
use = []

[install]
script = ""

[scripts]
post_install = """
ldconfig
"""
