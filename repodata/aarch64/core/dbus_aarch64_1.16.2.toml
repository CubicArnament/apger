[package]
name = "dbus"
version = "1.16.2"
type = "library"
architecture = "aarch64"
description = "D-Bus — message bus system for inter-process communication; provides both the libdbus library and the dbus-daemon system/session bus daemon"
maintainer = "NurOS Team <team@nuros.org>"
license = "AFL-2.1 OR GPL-2.0-or-later"
homepage = "https://www.freedesktop.org/wiki/Software/dbus/"
dependencies = ["glibc", "libffi", "expat", "openssl"]
bootstrap = false

[source]
url = "https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["make", "gcc", "pkg-config", "libffi-devel", "expat-devel", "openssl-devel"]
use = []

[install]
script = ""

[service]
name = "dbus"
description = "D-Bus System Message Bus"
exec = "/usr/bin/dbus-daemon --system --nofork --nopidfile --syslog-only"
type = "simple"
restart = true

[scripts]
post_install = """
getent group messagebus >/dev/null || groupadd -r messagebus
getent passwd messagebus >/dev/null || useradd -r -g messagebus -d / -s /sbin/nologin -c "D-Bus Message Daemon" messagebus
install -d -m 755 -o messagebus -g messagebus /run/dbus
ldconfig
"""
post_remove = """
ldconfig
"""
