[package]
name = "libwebp"
version = "1.4.0"
type = "binary"
architecture = "x86_64"
description = "WebP image format library"
maintainer = "NurOS Team <team@nuros.org>"
license = "BSD-3-Clause"
homepage = "https://developers.google.com/speed/webp"
dependencies = ["libpng", "libjpeg-turbo"]
bootstrap = false

[source]
url = "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.4.0.tar.gz"
type_src = "tarball"

[build]
template = "cmake"
dependencies = ["libpng-devel", "libjpeg-turbo-devel"]
use = []

[install]
script = ""
