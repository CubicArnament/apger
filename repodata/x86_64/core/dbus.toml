[package]
name = "dbus"
version = "1.15.8"
type = "library"
architecture = "x86_64"
description = "D-Bus — message bus system for inter-process communication"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-2.0"
homepage = "https://www.freedesktop.org/wiki/Software/dbus/"
dependencies = ["glibc", "libffi", "openssl"]
bootstrap = false

[source]
url = "https://dbus.freedesktop.org/releases/dbus/dbus-1.15.8.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["make", "gcc", "pkg-config", "libffi-devel", "openssl-devel", "expat-devel"]
use = []

[install]
script = ""
