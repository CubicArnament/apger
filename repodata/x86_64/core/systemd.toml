[package]
name = "systemd"
version = "255"
type = "binary"
architecture = "x86_64"
description = "System and service manager — init system and service supervisor for NurOS"
maintainer = "NurOS Team <team@nuros.org>"
license = "LGPL-2.1"
homepage = "https://systemd.io/"
dependencies = ["glibc", "dbus", "pam", "openssl", "xz", "zstd", "libffi"]
bootstrap = false

[source]
url = "https://github.com/systemd/systemd/archive/v255/systemd-255.tar.gz"
type_src = "tarball"

[build]
template = "meson"
dependencies = ["meson", "ninja", "gcc", "pkg-config", "dbus-devel", "pam-devel", "openssl-devel", "xz-devel", "zstd-devel", "libffi-devel", "libcap-devel"]
use = []

[install]
script = ""
