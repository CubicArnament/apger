[package]
name = "gcc"
version = "15.2.0"
type = "binary"
architecture = "x86_64"
description = "GNU Compiler Collection — optimising compilers for C, C++, Fortran, Ada, Go, and D; also produces libgcc and libstdc++ runtime libraries"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0-or-later"
homepage = "https://gcc.gnu.org/"
dependencies = ["binutils", "glibc", "zlib"]
# gcc build also produces libgcc and libstdc++ as split packages
provides = ["libgcc", "libstdc++"]
bootstrap = true

[source]
url = "https://ftp.gnu.org/gnu/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["make", "binutils", "glibc", "zlib-devel", "gmp-devel", "mpfr-devel", "mpc-devel"]
use = []

[install]
script = ""

[scripts]
post_install = """
ldconfig
"""
