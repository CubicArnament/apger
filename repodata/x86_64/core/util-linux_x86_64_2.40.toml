[package]
name = "util-linux"
version = "2.40"
type = "binary"
architecture = "x86_64"
description = "Miscellaneous Linux utilities — mount, fdisk, login, and more"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-2.0"
homepage = "https://github.com/util-linux/util-linux"
dependencies = ["glibc", "pam", "zlib"]
bootstrap = false

[source]
url = "https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["make", "gcc", "pam-devel", "zlib-devel", "ncurses-devel"]
use = []

[install]
script = ""
