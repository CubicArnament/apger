[package]
name = "gdb"
version = "14.2"
type = "binary"
architecture = "x86_64"
description = "GNU debugger"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0"
homepage = "https://www.gnu.org/software/gdb/"
dependencies = ["python3", "ncurses", "readline", "expat", "zlib", "mpfr"]
bootstrap = false

[source]
url = "https://ftp.gnu.org/gnu/gdb/gdb-14.2.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["python3-devel", "ncurses-devel", "readline-devel", "expat-devel", "zlib-devel", "mpfr-devel"]
use = []

[install]
script = ""
