[package]
name = "git"
version = "2.45.0"
type = "binary"
architecture = "x86_64"
description = "Distributed version control system"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-2.0"
homepage = "https://git-scm.com"
dependencies = ["openssl", "curl", "zlib", "expat", "pcre2"]
bootstrap = false

[source]
url = "https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.45.0.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["openssl-devel", "curl-devel", "zlib-devel", "expat-devel", "pcre2-devel"]
use = []

[install]
script = ""
