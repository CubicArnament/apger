[package]
name = "wget"
version = "1.25.0"
type = "binary"
architecture = "x86_64"
description = "Non-interactive network downloader supporting HTTP, HTTPS, and FTP"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0"
homepage = "https://www.gnu.org/software/wget/"
dependencies = ["openssl", "zlib", "pcre2"]

[source]
url = "https://ftp.gnu.org/gnu/wget/wget-1.25.0.tar.gz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["openssl-devel", "zlib-devel", "pcre2-devel"]
use = []

[install]
script = ""
