[package]
name = "rsync"
version = "3.3.0"
type = "binary"
architecture = "x86_64"
description = "Fast file transfer and sync"
maintainer = "NurOS Team <team@nuros.org>"
license = "GPL-3.0"
homepage = "https://rsync.samba.org"
dependencies = ["openssl", "zlib", "popt"]
bootstrap = false

[source]
url = "https://download.samba.org/pub/rsync/rsync-3.3.0.tar.gz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["openssl-devel", "zlib-devel", "popt-devel"]
use = []

[install]
script = ""
