[package]
name = "python3"
version = "3.13.3"
type = "binary"
architecture = "x86_64"
description = "High-level, general-purpose programming language with dynamic typing and garbage collection"
maintainer = "NurOS Team <team@nuros.org>"
license = "PSF-2.0"
homepage = "https://www.python.org"
dependencies = ["openssl", "zlib", "bzip2", "xz", "libffi", "readline", "ncurses"]

[source]
url = "https://www.python.org/ftp/python/3.13.3/Python-3.13.3.tar.xz"
type_src = "tarball"

[build]
template = "autotools"
dependencies = ["openssl-devel", "zlib-devel", "bzip2-devel", "xz-devel", "libffi-devel", "readline-devel", "ncurses-devel"]
use = []

[install]
script = ""

[scripts]
ldconfig = true
