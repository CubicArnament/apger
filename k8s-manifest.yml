# APGer Kubernetes Manifest
#
# Architecture:
#   1. Pod `apger` builds libapg.so → apgbuild → apger (init containers)
#   2. apger copies apgbuild + libapg.so to PVC /output/tools/
#   3. apger spawns per-package Jobs; each Job mounts PVC and runs apgbuild
#   4. Job dies, next Job starts — apger orchestrates the queue
#
# Quick start:
#   kubectl apply -f k8s-manifest.yml
#   kubectl attach -it apger -n apger
#
# Detach: Ctrl+P, Ctrl+Q  |  Re-attach: kubectl attach -it apger -n apger

---
# NFS StorageClass — provisioned by nfs-subdir-external-provisioner.
# Install provisioner first (see COMMANDS.md § NFS setup).
# NFS server exports the directory that appears on your host machine automatically.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apger-builds
  namespace: apger
  labels:
    app: apger
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apger-conf
  namespace: apger
  labels:
    app: apger
data:
  apger.conf: |
    [build.packages]
    march = "x86_64-v2"
    mtune = "x86_64-v3"
    opt_level = "O2"
    lto = "thin"
    cc = "gcc"
    cxx = "g++"
    ld = "mold"
    library_glibc_hwcaps = true
    levels_hwcaps = ["x86_64-v3", "x86_64-v2"]

    [aria2]
    connections = 4
    splits = 4
    min_split_size = "1M"
    max_tries = 5
    timeout = 60
    continue = true

    [database.pkgs]
    type = "bbolt"
    name = "pkgs.db"

    [kubernetes.options]
    namespace = "apger"
    base_image = "fedora:43"
    search_local = true
    pull_remote = false
    kind_load = false

    [kubernetes.options.oomkill_limits]
    cpu = "10"
    memory = "16Gi"

    [logging]
    verbose = false

---
# kubectl create secret generic apger-credentials \
#   --from-literal=github_app_id=<APP_ID> \
#   --from-file=github_pem=<path/to/app.private-key.pem> \
#   --from-literal=pgp_private_key="$(cat private.asc)" \
#   --from-literal=name="Your Name" --from-literal=email="you@example.com" \
#   -n apger
apiVersion: v1
kind: Secret
metadata:
  name: apger-credentials
  namespace: apger
  labels:
    app: apger
type: Opaque
stringData:
  github_app_id: "0"
  github_pem: ""
  pat: ""
  pgp_private_key: ""
  name: ""
  email: ""

---
apiVersion: v1
kind: Pod
metadata:
  name: apger
  namespace: apger
  labels:
    app: apger
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 10
  automountServiceAccountToken: false

  initContainers:
    # Stage 1: install build dependencies
    - name: install-deps
      image: fedora:43
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make meson ninja-build pkg-config \
            git aria2 golang \
            libarchive-devel lmdb-devel yyjson-devel libsodium-devel \
            mold binutils \
            && dnf clean all
      resources:
        requests: {cpu: "1", memory: 1Gi}
        limits:   {cpu: "4", memory: 4Gi}

    # Stage 2: clone source with submodules
    - name: clone-source
      image: fedora:43
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          git clone --recurse-submodules https://github.com/NurOS-Linux/apger.git /src
      resources:
        requests: {cpu: "500m", memory: 512Mi}
        limits:   {cpu: "2",    memory: 2Gi}
      volumeMounts:
        - name: source
          mountPath: /src

    # Stage 3: build libapg.so → apgbuild → apger, install to /tools
    - name: build-tools
      image: fedora:43
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          echo "=== libapg + apgbuild + apger ==="
          cd /src/src
          meson setup build --prefix=/tools --buildtype=release
          ninja -C build
          ninja -C build install
          ldconfig /tools/lib 2>/dev/null || true
          echo "=== Done: $(ls /tools/bin/) ==="
      env:
        - name: CGO_ENABLED
          value: "1"
      resources:
        requests: {cpu: "2",  memory: 2Gi}
        limits:   {cpu: "10", memory: 16Gi}
      volumeMounts:
        - name: source
          mountPath: /src
        - name: tools
          mountPath: /tools

    # Stage 4: assemble credentials JSON into RAM volume
    - name: assemble-credentials
      image: fedora:43
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          APP_ID=$(cat /secrets/github_app_id 2>/dev/null || echo "0")
          PEM=$(cat /secrets/github_pem 2>/dev/null \
            | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo '""')
          PGP=$(cat /secrets/pgp_private_key 2>/dev/null \
            | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo '""')
          NAME=$(cat /secrets/name  2>/dev/null || echo "apger")
          EMAIL=$(cat /secrets/email 2>/dev/null || echo "apger@nuros.org")
          cat > /creds/apger.json <<EOF
          {"name":"$NAME","email":"$EMAIL","github_app_id":$APP_ID,"github_pem":$PEM,"pgp_private_key":$PGP}
          EOF
          chmod 600 /creds/apger.json
      volumeMounts:
        - name: credentials
          mountPath: /secrets
          readOnly: true
        - name: creds-assembled
          mountPath: /creds

  containers:
    - name: apger
      image: fedora:43
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
        - |
          export PATH="/tools/bin:$PATH"
          export LD_LIBRARY_PATH="/tools/lib:$LD_LIBRARY_PATH"
          # Stage apgbuild + libapg.so to PVC so build Jobs can use them
          mkdir -p /output/tools/bin /output/tools/lib
          cp /tools/bin/apgbuild        /output/tools/bin/apgbuild
          cp /tools/lib/libapg.so*      /output/tools/lib/ 2>/dev/null || true
          chmod +x /output/tools/bin/apgbuild
          echo "[apger] Tools staged to PVC at /output/tools/"
          echo "[apger] Ready. Run: apger --tui"
          exec /bin/bash --login || sleep infinity
      stdin: true
      tty: true
      env:
        - name: TERM
          value: "xterm-256color"
        - name: COLORTERM
          value: "truecolor"
        - name: APGER_CREDS_PATH
          value: "/run/secrets/apger/apger.json"
        - name: APGER_CONFIG
          value: "/etc/apger/apger.conf"
        - name: CGO_ENABLED
          value: "1"
      resources:
        requests: {cpu: "500m", memory: 512Mi}
        limits:   {cpu: "10",   memory: 16Gi}
      volumeMounts:
        - name: tools
          mountPath: /tools
        - name: builds
          mountPath: /output
        - name: conf
          mountPath: /etc/apger
          readOnly: true
        - name: creds-assembled
          mountPath: /run/secrets/apger

  volumes:
    - name: builds
      persistentVolumeClaim:
        claimName: apger-builds
    - name: source
      emptyDir: {}
    - name: tools
      emptyDir: {}
    - name: conf
      configMap:
        name: apger-conf
    - name: credentials
      secret:
        secretName: apger-credentials
        optional: true
    - name: creds-assembled
      emptyDir:
        medium: Memory
