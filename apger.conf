# APGer Build Configuration
# TOML config for NurOS package builder
#
# Self-build flags (apgbuild, apger) are hardcoded in Meson.build:
#   -march=native -O3 -flto=thin -fuse-ld=mold
#
# This file only configures [build.packages] — flags for distro packages.

[build.packages]
# Target: packages distributed to end users
# march/mtune/levels_hwcaps accept any casing or separator:
#   "x86_64-v2", "X86-64-V2", "x86_64v2" are all equivalent.
march = "x86_64-v2"
mtune = "x86_64-v3"
opt_level = "O2"
lto = "thin"
cc = "gcc"
cxx = "g++"
ld = "mold"
# Build shared libraries for each hwcaps level and place them in
# usr/lib/glibc-hwcaps/<level>/ so glibc picks the best variant at runtime.
library_glibc_hwcaps = true
levels_hwcaps = ["x86_64-v3", "x86_64-v2"]

[database.pkgs]
# Package database backend.
# The backend is selected at compile time via Go build tags — this field
# must match the tag used during compilation:
#
#   go build -tags bbolt   → type = "bbolt"  (default, no CGO required)
#   go build -tags sqlite  → type = "sqlite" (requires CGO + libsqlite3)
#
# Supported values: "bbolt", "sqlite"
type = "bbolt"
name = "pkgs.db"

[kubernetes.options]
# Kubernetes namespace for build pods
namespace = "apger"
# Base container image for all build pods
base_image = "fedora:43"
# search_local=true  → imagePullPolicy: IfNotPresent
# search_local=false → imagePullPolicy: Never
search_local = true
# pull_remote=true overrides search_local → imagePullPolicy: Always
pull_remote = false
# kind_load=true → run 'kind load docker-image <base_image>' before each Job
kind_load = false

[kubernetes.options.oomkill_limits]
# Hard resource limits for build pods.
# apger validates these against the host at startup — if they exceed real
# system resources the build is aborted before any pod is created.
# CPU format:    "10" (cores) or "500m" (millicores)
# Memory format: "16Gi", "8G", "512Mi"
cpu = "10"
memory = "16Gi"

[pod.options]
# Interactive TUI pod settings
stdin = true
tty = true

[save.options]
# Package publish settings
remote = true
# "forgejo:github" — publish to a Forgejo-compatible GitHub organisation
type = "forgejo:github"
github_org_name = "NurOS-Packages"
# "create_or_update" — create release if absent, update if present
method = "create_or_update"
repository = true

[logging]
# verbose = true reduces log filtering during builds.
# All lines are still syntax-highlighted (CC/CXX/LD/errors/warnings/...).
# false = kbuild-style: only meaningful lines shown (default)
# true  = show more: configure checks, make internals, cmake status, notes
verbose = false
